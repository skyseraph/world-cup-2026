<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 · 世界杯</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #050a14; --surface: #0d1829; --surface2: #111f38;
  --border: #1a2f50; --border2: #243d60;
  --accent: #00d4ff; --accent2: #ff6b35; --gold: #ffd700;
  --green: #00e676; --red: #ff4444;
  --text: #e8edf5; --muted: #6b7fa3; --muted2: #8fa0bf;
}
body { font-family: 'Inter','PingFang SC','Microsoft YaHei',sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

/* ── Header ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 52px;
  background: rgba(5,10,20,0.9); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.logo { font-size: 16px; font-weight: 700; white-space: nowrap;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; flex-shrink: 0; }
#nav { display: flex; gap: 3px; flex-wrap: nowrap; }
.nav-btn {
  padding: 5px 11px; border-radius: 18px; border: 1px solid transparent;
  background: none; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.nav-btn:hover { color: var(--text); border-color: var(--border); }
.nav-btn.active { background: var(--accent); color: #000; font-weight: 600; border-color: var(--accent); }
#header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
#lang-btn {
  padding: 4px 10px; border-radius: 14px; border: 1px solid var(--border2);
  background: var(--surface2); color: var(--muted2); font-size: 11px; cursor: pointer; transition: all 0.2s;
}
#lang-btn:hover { color: var(--text); border-color: var(--accent); }
#updated-at { font-size: 10px; color: var(--muted); }

/* ── Layout ── */
#app { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; display: grid; grid-template-columns: 1fr 360px; }
#canvas-wrap { position: relative; overflow: hidden; }
#globe-canvas { display: block; width: 100%; height: 100%; }

/* ── Panel ── */
#panel { background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; overflow-x: hidden; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
#panel::-webkit-scrollbar { width: 4px; }
#panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.panel-section { display: none; padding: 14px; }
.panel-section.active { display: block; }
.section-title { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }

/* ── Match card ── */
.match-card {
  background: rgba(255,255,255,0.03); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px; margin-bottom: 7px; cursor: pointer; transition: all 0.2s;
}
.match-card:hover { border-color: var(--accent); background: rgba(0,212,255,0.05); }
.match-meta { font-size: 10px; color: var(--muted); margin-bottom: 7px; display: flex; justify-content: space-between; align-items: center; }
.match-date-badge { background: var(--surface2); border-radius: 4px; padding: 1px 6px; font-size: 10px; color: var(--muted2); }
.match-teams { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.team-info { display: flex; align-items: center; gap: 7px; flex: 1; }
.team-info.away { flex-direction: row-reverse; text-align: right; }
.team-flag { width: 26px; height: 18px; object-fit: cover; border-radius: 2px; flex-shrink: 0; }
.team-name { font-size: 12px; font-weight: 600; }
.score-box { text-align: center; min-width: 48px; }
.score { font-size: 19px; font-weight: 700; letter-spacing: 2px; }
.score-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
.score-sub.live { color: var(--red); animation: pulse 1.5s infinite; }
.score-sub.done { color: var(--green); }
.odds-row { display: flex; gap: 5px; margin-top: 7px; }
.odd-chip { flex: 1; text-align: center; font-size: 10px; padding: 3px 0; background: rgba(255,255,255,0.04); border-radius: 4px; color: var(--muted); }
.odd-chip span { display: block; font-size: 11px; font-weight: 600; color: var(--text); }

/* ── Standings ── */
.group-block { margin-bottom: 18px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.group-header { display: flex; align-items: center; gap: 7px; padding: 9px 12px; background: var(--surface2); cursor: pointer; user-select: none; }
.group-header:hover { background: rgba(255,255,255,0.05); }
.group-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.group-name-text { font-size: 12px; font-weight: 700; flex: 1; }
.group-chevron { font-size: 10px; color: var(--muted); transition: transform 0.2s; }
.group-block.collapsed .group-chevron { transform: rotate(-90deg); }
.group-body { overflow: hidden; }
.group-block.collapsed .group-body { display: none; }
.standings-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.standings-table th { color: var(--muted); font-weight: 500; padding: 4px 8px; text-align: center; border-bottom: 1px solid var(--border); font-size: 10px; }
.standings-table th:first-child, .standings-table th:nth-child(2) { text-align: left; }
.standings-table td { padding: 6px 8px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; transition: background 0.15s; }
.standings-table td:first-child, .standings-table td:nth-child(2) { text-align: left; }
.standings-table tr:hover td { background: rgba(0,212,255,0.05); }
.standings-table tr:last-child td { border-bottom: none; }
.standings-table .pos { color: var(--muted); width: 16px; font-size: 10px; }
.standings-table .qualified td:first-child { border-left: 3px solid var(--accent); }
.standings-table .third td:first-child { border-left: 3px solid var(--gold); }
.team-cell { display: flex; align-items: center; gap: 6px; }
.team-cell img { width: 18px; height: 13px; object-fit: cover; border-radius: 1px; }
.pts { font-weight: 700; color: var(--gold); }
.gd-pos { color: var(--green); }
.gd-neg { color: var(--red); }

/* ── Team detail modal ── */
#team-modal {
  position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
#team-modal.show { opacity: 1; pointer-events: all; }
.modal-box {
  background: var(--surface); border: 1px solid var(--border2); border-radius: 16px;
  padding: 24px; min-width: 320px; max-width: 420px; width: 90%;
  transform: scale(0.95); transition: transform 0.2s;
}
#team-modal.show .modal-box { transform: scale(1); }
.modal-close { float: right; background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; }
.modal-close:hover { color: var(--text); }
.modal-team-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.modal-flag { width: 56px; height: 40px; object-fit: cover; border-radius: 5px; border: 1px solid var(--border); }
.modal-team-name { font-size: 20px; font-weight: 700; }
.modal-team-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
.modal-stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.modal-stat { background: var(--surface2); border-radius: 8px; padding: 10px 6px; text-align: center; }
.modal-stat-val { font-size: 20px; font-weight: 700; color: var(--accent); }
.modal-stat-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; }
.modal-matches-title { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.modal-match-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.modal-match-row:last-child { border-bottom: none; }
.modal-result-badge { padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; }
.result-W { background: rgba(0,230,118,0.15); color: var(--green); }
.result-D { background: rgba(255,215,0,0.12); color: var(--gold); }
.result-L { background: rgba(255,68,68,0.15); color: var(--red); }

/* ── Globe overlay ── */
#team-card {
  position: absolute; bottom: 20px; left: 20px;
  background: rgba(13,24,41,0.94); backdrop-filter: blur(16px);
  border: 1px solid var(--border2); border-radius: 12px; padding: 14px 18px;
  min-width: 210px; display: none; pointer-events: none; z-index: 10;
}
#team-card.show { display: block; }
#team-card .tc-flag { width: 44px; height: 31px; object-fit: cover; border-radius: 3px; margin-bottom: 8px; }
#team-card .tc-name { font-size: 15px; font-weight: 700; }
#team-card .tc-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
#team-card .tc-stats { display: flex; gap: 14px; margin-top: 10px; }
#team-card .tc-stat-val { font-size: 17px; font-weight: 700; color: var(--accent); }
#team-card .tc-stat-lbl { font-size: 9px; color: var(--muted); margin-top: 1px; }
#canvas-hint { position: absolute; bottom: 20px; right: 20px; font-size: 10px; color: var(--muted); background: rgba(13,24,41,0.75); padding: 7px 11px; border-radius: 7px; border: 1px solid var(--border); line-height: 1.8; pointer-events: none; }

/* ── Prediction ── */
.predict-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
.predict-match-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.predict-teams { font-size: 13px; font-weight: 600; }
.predict-time { font-size: 10px; color: var(--muted); }
.predict-bars { display: flex; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
.bar-home { background: var(--accent); transition: width 0.6s; }
.bar-draw { background: var(--gold); transition: width 0.6s; }
.bar-away { background: var(--accent2); transition: width 0.6s; }
.predict-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 8px; }
.predict-verdict { font-size: 11px; color: var(--muted2); line-height: 1.6; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 2px; }
.predict-disclaimer { font-size: 9px; color: var(--muted); margin-top: 5px; opacity: 0.7; }
.predict-source-note { font-size: 10px; color: var(--muted); text-align: center; padding: 12px; line-height: 1.7; }

/* ── Skill guide ── */
.skill-guide { font-size: 12px; line-height: 1.8; }
.skill-guide h3 { font-size: 13px; color: var(--accent); margin: 12px 0 6px; }
.skill-guide code { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-size: 11px; font-family: 'SF Mono','Fira Code',monospace; color: var(--accent2); }
.skill-guide pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px; font-size: 10px; font-family: 'SF Mono','Fira Code',monospace; overflow-x: auto; color: var(--text); line-height: 1.7; margin: 6px 0; }
.skill-guide .tip { background: rgba(0,212,255,0.07); border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0; padding: 8px 10px; margin: 8px 0; font-size: 11px; color: var(--muted2); }

/* ── Loading ── */
#loading { position: fixed; inset: 0; z-index: 500; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; transition: opacity 0.5s; }
#loading.hidden { opacity: 0; pointer-events: none; }
.loading-logo { font-size: 26px; font-weight: 800; background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.loading-bar { width: 200px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
.loading-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); width: 0; transition: width 0.3s; }
.loading-text { font-size: 12px; color: var(--muted); }

@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">⚽ WORLD CUP 2026</div>
  <div class="loading-bar"><div class="loading-fill" id="load-fill"></div></div>
  <div class="loading-text" id="load-text">正在加载...</div>
</div>

<header id="header">
  <div class="logo">⚽ FIFA World Cup 2026</div>
  <nav id="nav">
    <button class="nav-btn active" data-view="globe" data-i18n-key="nav_globe">🌍 地球仪</button>
    <button class="nav-btn" data-view="matches" data-i18n-key="nav_matches">📅 赛程</button>
    <button class="nav-btn" data-view="standings" data-i18n-key="nav_standings">🏆 积分榜</button>
    <button class="nav-btn" data-view="predict" data-i18n-key="nav_predict">🔮 预测</button>
    <button class="nav-btn" data-view="skill" data-i18n-key="nav_skill">🛠 Skill</button>
  </nav>
  <div id="header-right">
    <button id="lang-btn">EN</button>
    <div id="updated-at"></div>
  </div>
</header>

<div id="app">
  <div id="canvas-wrap">
    <canvas id="globe-canvas"></canvas>
    <div id="team-card">
      <img class="tc-flag" id="tc-flag" src="" alt="">
      <div class="tc-name" id="tc-name"></div>
      <div class="tc-sub" id="tc-sub"></div>
      <div class="tc-stats" id="tc-stats"></div>
    </div>
    <div id="canvas-hint" data-i18n-key="globe_hint">🖱 拖拽旋转 · 滚轮缩放 · 点击查看球队</div>
  </div>

  <div id="panel">
    <div class="panel-section active" id="view-globe">
      <div class="section-title" data-i18n-key="globe_title">🌍 2026 FIFA 世界杯</div>
      <div id="globe-info" style="font-size:12px;color:var(--muted);line-height:2"></div>
    </div>
    <div class="panel-section" id="view-matches">
      <div class="section-title" data-i18n-key="matches_title">📅 近期赛事</div>
      <div id="matches-list"></div>
    </div>
    <div class="panel-section" id="view-standings">
      <div class="section-title" data-i18n-key="standings_title">🏆 小组积分榜</div>
      <div id="standings-list"></div>
    </div>
    <div class="panel-section" id="view-predict">
      <div class="section-title" data-i18n-key="predict_title">🔮 今日赛事预测</div>
      <div id="predict-list"></div>
    </div>
    <div class="panel-section" id="view-skill">
      <div class="section-title" data-i18n-key="skill_title">🛠 Skill 使用指南</div>
      <div id="skill-guide-content" class="skill-guide"></div>
    </div>
  </div>
</div>

<!-- Team detail modal -->
<div id="team-modal">
  <div class="modal-box">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-team-header">
      <img class="modal-flag" id="modal-flag" src="" alt="">
      <div>
        <div class="modal-team-name" id="modal-name"></div>
        <div class="modal-team-sub" id="modal-sub"></div>
      </div>
    </div>
    <div class="modal-stats-grid" id="modal-stats"></div>
    <div class="modal-matches-title" data-i18n-key="modal_recent">近期比赛</div>
    <div id="modal-matches"></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module" src="assets/js/main.js"></script>
</body>
</html>
