<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 · 世界杯</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #050a14; --surface: #0d1829; --surface2: #111f38; --surface3: #162440;
  --border: #1a2f50; --border2: #243d60;
  --accent: #00d4ff; --accent2: #ff6b35; --gold: #ffd700;
  --green: #00e676; --red: #ff4444; --yellow: #ffd700;
  --text: #e8edf5; --muted: #6b7fa3; --muted2: #8fa0bf;
}
body { font-family: 'Inter','PingFang SC','Microsoft YaHei',sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

/* ── Header ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 50px;
  background: rgba(5,10,20,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); gap: 10px;
}
.logo { font-size: 15px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
#nav { display: flex; gap: 2px; flex-wrap: nowrap; }
.nav-btn { padding: 5px 10px; border-radius: 16px; border: 1px solid transparent;
  background: none; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.nav-btn:hover { color: var(--text); border-color: var(--border); }
.nav-btn.active { background: var(--accent); color: #000; font-weight: 600; border-color: var(--accent); }
#header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.hdr-btn { padding: 4px 9px; border-radius: 12px; border: 1px solid var(--border2);
  background: var(--surface2); color: var(--muted2); font-size: 11px; cursor: pointer; transition: all 0.2s; }
.hdr-btn:hover { color: var(--text); border-color: var(--accent); }
#updated-at { font-size: 10px; color: var(--muted); }

/* ── Layout ── */
#app { position: fixed; top: 50px; left: 0; right: 0; bottom: 0; display: grid; grid-template-columns: 1fr 360px; }
#canvas-wrap { position: relative; overflow: hidden; }
#globe-canvas { display: block; width: 100%; height: 100%; }

/* ── Panel ── */
#panel { background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; overflow-x: hidden; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
#panel::-webkit-scrollbar { width: 4px; }
#panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.panel-section { display: none; }
.panel-section.active { display: block; }
.section-header { padding: 12px 14px 8px; position: sticky; top: 0; background: var(--surface); z-index: 5; border-bottom: 1px solid var(--border); }
.section-title { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; }
.section-body { padding: 10px 14px 14px; }

/* ── Globe info panel ── */
#globe-team-panel { padding: 14px; }
#globe-team-panel .globe-intro { font-size: 12px; color: var(--muted); line-height: 2; margin-bottom: 14px; }
#globe-team-detail { display: none; }
#globe-team-detail.show { display: block; }
.team-detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.team-detail-flag { width: 52px; height: 37px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border2); }
.team-detail-name { font-size: 18px; font-weight: 700; }
.team-detail-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 14px; }
.stat-box { background: var(--surface2); border-radius: 8px; padding: 9px 5px; text-align: center; border: 1px solid var(--border); }
.stat-val { font-size: 18px; font-weight: 700; color: var(--accent); }
.stat-lbl { font-size: 9px; color: var(--muted); margin-top: 2px; }
.subsection-title { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin: 12px 0 7px; }
.group-peers { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.peer-chip { display: flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer; transition: border-color 0.2s; }
.peer-chip:hover { border-color: var(--accent); }
.peer-chip img { width: 18px; height: 13px; object-fit: cover; border-radius: 1px; }
.team-match-list { }
.team-match-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 11px; cursor: pointer; transition: color 0.2s; }
.team-match-row:hover { color: var(--accent); }
.team-match-row:last-child { border-bottom: none; }
.result-badge { padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; }
.r-W { background: rgba(0,230,118,0.12); color: var(--green); }
.r-D { background: rgba(255,215,0,0.1); color: var(--gold); }
.r-L { background: rgba(255,68,68,0.12); color: var(--red); }

/* ── Match card ── */
.match-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px; margin-bottom: 7px; cursor: pointer; transition: all 0.18s; }
.match-card:hover { border-color: var(--accent); background: rgba(0,212,255,0.04); transform: translateY(-1px); }
.match-meta { font-size: 10px; color: var(--muted); margin-bottom: 7px; display: flex; justify-content: space-between; align-items: center; gap: 6px; }
.date-badge { background: var(--surface3); border-radius: 4px; padding: 1px 6px; font-size: 10px; color: var(--muted2); }
.match-teams { display: flex; align-items: center; justify-content: space-between; gap: 5px; }
.team-side { display: flex; align-items: center; gap: 6px; flex: 1; }
.team-side.away { flex-direction: row-reverse; text-align: right; }
.team-flag-sm { width: 24px; height: 17px; object-fit: cover; border-radius: 2px; flex-shrink: 0; }
.team-nm { font-size: 12px; font-weight: 600; }
.score-box { text-align: center; min-width: 46px; flex-shrink: 0; }
.score-main { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
.score-tag { font-size: 9px; color: var(--muted); margin-top: 1px; }
.score-tag.live { color: var(--red); animation: pulse 1.5s infinite; }
.score-tag.done { color: var(--green); }
.odds-strip { display: flex; gap: 4px; margin-top: 7px; }
.odd-chip { flex: 1; text-align: center; font-size: 10px; padding: 3px 0; background: rgba(255,255,255,0.04); border-radius: 4px; color: var(--muted); }
.odd-chip b { display: block; font-size: 11px; color: var(--text); font-weight: 600; }

/* ── Standings ── */
.group-block { margin-bottom: 12px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.group-hdr { display: flex; align-items: center; gap: 7px; padding: 8px 10px; background: var(--surface2); cursor: pointer; user-select: none; transition: background 0.15s; }
.group-hdr:hover { background: var(--surface3); }
.gdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.gname { font-size: 12px; font-weight: 700; flex: 1; }
.gchev { font-size: 10px; color: var(--muted); transition: transform 0.2s; }
.group-block.collapsed .gchev { transform: rotate(-90deg); }
.group-block.collapsed .group-body { display: none; }
.stn-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.stn-table th { color: var(--muted); font-weight: 500; padding: 4px 6px; text-align: center; border-bottom: 1px solid var(--border); font-size: 10px; }
.stn-table th:first-child, .stn-table th:nth-child(2) { text-align: left; }
.stn-table td { padding: 6px 6px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.03); }
.stn-table td:first-child, .stn-table td:nth-child(2) { text-align: left; }
.stn-table tr.clickable { cursor: pointer; }
.stn-table tr.clickable:hover td { background: rgba(0,212,255,0.06); }
.stn-table tr:last-child td { border-bottom: none; }
.stn-table .pos { color: var(--muted); font-size: 10px; }
.stn-table .q1 td:first-child, .stn-table .q2 td:first-child { border-left: 3px solid var(--accent); }
.stn-table .q3 td:first-child { border-left: 3px solid var(--gold); }
.tcell { display: flex; align-items: center; gap: 5px; }
.tcell img { width: 16px; height: 11px; object-fit: cover; border-radius: 1px; }
.pts { font-weight: 700; color: var(--gold); }
.gd-p { color: var(--green); } .gd-n { color: var(--red); }
.stn-hint { font-size: 10px; color: var(--muted); padding: 5px 6px 7px; }

/* ── Predict card ── */
.predict-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.18s; }
.predict-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.predict-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.predict-teams-txt { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.predict-time { font-size: 10px; color: var(--muted); flex-shrink: 0; }
.pred-bars { display: flex; height: 7px; border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
.bar-h { background: var(--accent); } .bar-d { background: var(--gold); } .bar-a { background: var(--accent2); }
.pred-pcts { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 6px; }
.pred-verdict { font-size: 11px; color: var(--muted2); display: flex; align-items: center; justify-content: space-between; }
.expand-hint { font-size: 10px; color: var(--muted); }
.predict-detail { display: none; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
.predict-detail.open { display: block; }
.analysis-section { margin-bottom: 10px; }
.analysis-label { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 5px; }
.analysis-body { font-size: 11px; color: var(--muted2); line-height: 1.7; }
.odds-comparison { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin: 8px 0; }
.odds-col { background: var(--surface3); border-radius: 6px; padding: 7px 5px; text-align: center; }
.odds-col .odds-val { font-size: 16px; font-weight: 700; }
.odds-col .odds-lbl { font-size: 9px; color: var(--muted); margin-top: 2px; }
.odds-col .odds-pct { font-size: 11px; font-weight: 600; margin-top: 3px; }
.h-col .odds-val { color: var(--accent); } .d-col .odds-val { color: var(--gold); } .a-col .odds-val { color: var(--accent2); }
.form-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.form-dot { width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
.form-W { background: rgba(0,230,118,0.15); color: var(--green); }
.form-D { background: rgba(255,215,0,0.1); color: var(--gold); }
.form-L { background: rgba(255,68,68,0.12); color: var(--red); }
.predict-disclaimer { font-size: 9px; color: var(--muted); margin-top: 8px; opacity: 0.7; }
.predict-intro { font-size: 11px; color: var(--muted); padding: 8px 0 12px; line-height: 1.7; }

/* ── Skill / AI Chat ── */
#chat-wrap { display: flex; flex-direction: column; height: calc(100vh - 50px - 100px); }
#chat-messages { flex: 1; overflow-y: auto; padding: 10px 14px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
#chat-messages::-webkit-scrollbar { width: 3px; }
#chat-messages::-webkit-scrollbar-thumb { background: var(--border); }
.chat-msg { margin-bottom: 10px; animation: fadein 0.2s; }
.chat-msg.user { text-align: right; }
.bubble { display: inline-block; max-width: 85%; padding: 8px 12px; border-radius: 10px; font-size: 12px; line-height: 1.6; text-align: left; }
.user .bubble { background: var(--accent); color: #000; font-weight: 500; }
.assistant .bubble { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
.assistant .bubble pre { background: var(--surface3); border-radius: 5px; padding: 6px 8px; font-size: 10px; font-family: 'SF Mono','Fira Code',monospace; margin-top: 6px; overflow-x: auto; white-space: pre-wrap; }
.assistant .bubble table { width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 11px; }
.assistant .bubble th { background: var(--surface3); padding: 4px 6px; text-align: left; font-weight: 600; border-bottom: 1px solid var(--border); }
.assistant .bubble td { padding: 4px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.thinking-dot { display: inline-flex; gap: 3px; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; }
.thinking-dot span { width: 5px; height: 5px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
.thinking-dot span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dot span:nth-child(3) { animation-delay: 0.4s; }
#chat-key-bar { padding: 8px 14px; border-top: 1px solid var(--border); background: var(--surface); }
.key-status { font-size: 10px; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.key-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); }
.key-dot.ready { background: var(--green); }
#api-key-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 11px; margin-bottom: 6px; }
#api-key-input:focus { outline: none; border-color: var(--accent); }
#api-key-input::placeholder { color: var(--muted); }
.key-note { font-size: 10px; color: var(--muted); line-height: 1.6; }
#chat-input-bar { padding: 10px 14px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 7px; }
#chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 11px; color: var(--text); font-size: 12px; resize: none; height: 36px; font-family: inherit; }
#chat-input:focus { outline: none; border-color: var(--accent); }
#chat-send { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 0 14px; font-size: 13px; cursor: pointer; font-weight: 700; transition: opacity 0.2s; }
#chat-send:hover { opacity: 0.85; }
#chat-send:disabled { opacity: 0.4; cursor: not-allowed; }
.quick-btns { display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 14px; border-bottom: 1px solid var(--border); }
.quick-btn { font-size: 10px; padding: 4px 9px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--muted2); cursor: pointer; transition: all 0.15s; }
.quick-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Match detail modal ── */
#match-modal { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.65); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
#match-modal.show { opacity: 1; pointer-events: all; }
.modal-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 0; width: 92%; max-width: 460px; max-height: 85vh; overflow-y: auto; transform: scale(0.95); transition: transform 0.2s; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
#match-modal.show .modal-box { transform: scale(1); }
.mmodal-header { padding: 16px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.mmodal-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; }
.mmodal-close:hover { color: var(--text); }
.mmodal-score-row { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; background: var(--surface2); }
.mmodal-team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 7px; }
.mmodal-team.away { }
.mmodal-flag { width: 48px; height: 34px; object-fit: cover; border-radius: 4px; }
.mmodal-team-name { font-size: 14px; font-weight: 700; text-align: center; }
.mmodal-score { font-size: 36px; font-weight: 800; letter-spacing: 4px; padding: 0 16px; }
.mmodal-meta { text-align: center; font-size: 10px; color: var(--muted); margin-top: 4px; }
.mmodal-body { padding: 14px 18px; }
.timeline-wrap { margin-bottom: 14px; }
.timeline-line { display: flex; align-items: flex-start; padding: 5px 0; gap: 10px; font-size: 11px; }
.tl-min { width: 28px; text-align: right; color: var(--muted); flex-shrink: 0; font-size: 10px; padding-top: 1px; }
.tl-icon { width: 18px; text-align: center; flex-shrink: 0; }
.tl-text { flex: 1; line-height: 1.4; }
.tl-team { font-size: 10px; color: var(--muted); }
.no-events { font-size: 11px; color: var(--muted); padding: 10px 0; text-align: center; }

/* ── Globe card ── */
#globe-hover-card { position: absolute; bottom: 18px; left: 18px; background: rgba(13,24,41,0.94); backdrop-filter: blur(16px); border: 1px solid var(--border2); border-radius: 11px; padding: 12px 16px; min-width: 200px; display: none; pointer-events: none; z-index: 10; }
#globe-hover-card.show { display: block; }
.ghc-flag { width: 40px; height: 28px; object-fit: cover; border-radius: 3px; margin-bottom: 7px; }
.ghc-name { font-size: 14px; font-weight: 700; }
.ghc-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
.ghc-hint { font-size: 10px; color: var(--accent); margin-top: 6px; }
#canvas-hint { position: absolute; bottom: 18px; right: 18px; font-size: 10px; color: var(--muted); background: rgba(13,24,41,0.75); padding: 6px 10px; border-radius: 7px; border: 1px solid var(--border); line-height: 1.8; pointer-events: none; }

/* ── Loading ── */
#loading { position: fixed; inset: 0; z-index: 500; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; transition: opacity 0.5s; }
#loading.hidden { opacity: 0; pointer-events: none; }
.loading-logo { font-size: 24px; font-weight: 800; background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.loading-bar { width: 180px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
.loading-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); width: 0; transition: width 0.3s; }
.loading-text { font-size: 11px; color: var(--muted); }

@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
@keyframes bounce { 0%,80%,100%{transform:scale(0.8);opacity:0.5}40%{transform:scale(1);opacity:1} }
@keyframes fadein { from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none} }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">⚽ WORLD CUP 2026</div>
  <div class="loading-bar"><div class="loading-fill" id="load-fill"></div></div>
  <div class="loading-text" id="load-text">正在加载...</div>
</div>

<header id="header">
  <div class="logo">⚽ FIFA World Cup 2026</div>
  <nav id="nav">
    <button class="nav-btn active" data-view="globe">🌍 地球仪</button>
    <button class="nav-btn" data-view="matches">📅 赛程</button>
    <button class="nav-btn" data-view="standings">🏆 积分榜</button>
    <button class="nav-btn" data-view="predict">🔮 预测</button>
    <button class="nav-btn" data-view="skill">🤖 AI问答</button>
  </nav>
  <div id="header-right">
    <a href="https://hits.sh/skyseraph.github.io/world-cup-2026/" target="_blank" rel="noopener" style="display:flex;align-items:center;text-decoration:none">
      <img src="https://hits.sh/skyseraph.github.io/world-cup-2026.svg?style=flat-square&label=visits&color=00d4ff&labelColor=0d1829" alt="visits" style="height:16px;border-radius:3px">
    </a>
    <button id="lang-btn" class="hdr-btn">EN</button>
    <div id="updated-at"></div>
  </div>
</header>

<div id="app">
  <div id="canvas-wrap">
    <canvas id="globe-canvas"></canvas>
    <div id="globe-hover-card">
      <img class="ghc-flag" id="ghc-flag" src="" alt="">
      <div class="ghc-name" id="ghc-name"></div>
      <div class="ghc-sub" id="ghc-sub"></div>
      <div class="ghc-hint" id="ghc-hint">点击查看详情 →</div>
    </div>
    <div id="canvas-hint" id="canvas-hint-txt">🖱 拖拽旋转 · 滚轮缩放 · 点击球队</div>
  </div>

  <div id="panel">
    <!-- Globe -->
    <div class="panel-section active" id="view-globe">
      <div class="section-header"><div class="section-title">🌍 2026 FIFA 世界杯</div></div>
      <div id="globe-team-panel">
        <!-- Group legend -->
        <div id="globe-legend" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)"></div>
        <!-- Today's matches -->
        <div id="globe-today-matches" style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)"></div>
        <div id="globe-intro-text" class="globe-intro"></div>
        <div id="globe-team-detail">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <button id="gtd-back" onclick="showGlobeIntro()" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;padding:3px 8px;cursor:pointer">← 返回</button>
          </div>
          <div class="team-detail-header">
            <img class="team-detail-flag" id="gtd-flag" src="" alt="">
            <div>
              <div class="team-detail-name" id="gtd-name"></div>
              <div class="team-detail-sub" id="gtd-sub"></div>
            </div>
          </div>
          <div class="stats-grid" id="gtd-stats"></div>
          <div class="subsection-title" id="gtd-peers-title">同组球队</div>
          <div class="group-peers" id="gtd-peers"></div>
          <div class="subsection-title" id="gtd-matches-title">本届赛事</div>
          <div class="team-match-list" id="gtd-matches"></div>
        </div>
      </div>
    </div>

    <!-- Matches -->
    <div class="panel-section" id="view-matches">
      <div class="section-header"><div class="section-title" id="matches-title-txt">📅 近期赛事</div></div>
      <div class="section-body" id="matches-list"></div>
    </div>

    <!-- Standings -->
    <div class="panel-section" id="view-standings">
      <div class="section-header"><div class="section-title">🏆 小组积分榜</div></div>
      <div class="section-body" id="standings-list"></div>
    </div>

    <!-- Predict -->
    <div class="panel-section" id="view-predict">
      <div class="section-header"><div class="section-title" id="predict-title-txt">🔮 赛事预测分析</div></div>
      <div class="section-body">
        <div class="predict-intro" id="predict-intro-txt"></div>
        <div id="predict-list"></div>
      </div>
    </div>

    <!-- AI Chat -->
    <div class="panel-section" id="view-skill">
      <div class="section-header"><div class="section-title">🤖 AI 世界杯助手</div></div>
      <div class="quick-btns" id="quick-btns"></div>
      <div id="chat-wrap">
        <div id="chat-messages"></div>
        <div id="chat-key-bar">
          <div class="key-status"><span class="key-dot" id="key-dot"></span><span id="key-status-text">未配置 API Key</span></div>
          <input id="api-key-input" type="password" placeholder="输入 Anthropic API Key (sk-ant-...)，仅存本地">
          <div class="key-note" id="key-note-txt"></div>
        </div>
        <div id="chat-input-bar">
          <textarea id="chat-input" placeholder="问我任何世界杯问题..." rows="1"></textarea>
          <button id="chat-send" disabled>发送</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Match detail modal -->
<div id="match-modal">
  <div class="modal-box">
    <div class="mmodal-header">
      <button class="mmodal-close" id="mmodal-close" style="display:flex;align-items:center;gap:4px;font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--muted2);cursor:pointer">← 返回</button>
      <span id="mmodal-title" style="font-size:13px;font-weight:700"></span>
      <div style="width:56px"></div>
    </div>
    <div class="mmodal-score-row">
      <div class="mmodal-team">
        <img class="mmodal-flag" id="mmodal-flag-h" src="" alt="">
        <div class="mmodal-team-name" id="mmodal-name-h"></div>
      </div>
      <div style="text-align:center">
        <div class="mmodal-score" id="mmodal-score"></div>
        <div class="mmodal-meta" id="mmodal-meta"></div>
      </div>
      <div class="mmodal-team away">
        <img class="mmodal-flag" id="mmodal-flag-a" src="" alt="">
        <div class="mmodal-team-name" id="mmodal-name-a"></div>
      </div>
    </div>
    <div class="mmodal-body">
      <div class="subsection-title" style="margin-top:0" id="mmodal-tl-title">比赛事件</div>
      <div id="mmodal-timeline"></div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module" src="assets/js/main.js"></script>
</body>
